name: One-shot PR33 BYOK smoke DPAPI id

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/one-shot-pr33-smoke-dpapi-id.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/productization-real-byok-connection-v1
          fetch-depth: 0
      - name: Update canonical Windows DPAPI store assertion
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('eng/ci/smoke-real-byok-model-connection.ps1')
          text = path.read_text(encoding='utf-8-sig')
          if text.count('dpapi-current-user') != 1:
              raise SystemExit(f'Expected one legacy DPAPI id, found {text.count("dpapi-current-user")}')
          text = text.replace('dpapi-current-user', 'windows-dpapi', 1)
          text = text.replace('does not use DPAPI references', 'does not use Windows DPAPI references', 1)
          path.write_text(text, encoding='utf-8')
          PY
          git diff --check
          git config user.name 'nodal-os-ci'
          git config user.email 'nodal-os-ci@users.noreply.github.com'
          git add eng/ci/smoke-real-byok-model-connection.ps1
          git commit -m 'test: assert canonical Windows DPAPI store id'
          git push origin HEAD:feature/productization-real-byok-connection-v1
