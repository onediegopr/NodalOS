name: One-shot Product Surface Cleanup

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/one-shot-product-surface-cleanup.yml'

permissions:
  contents: write

jobs:
  validate-and-commit:
    if: github.head_ref == 'audit/total-cleanup-2026-07-16'
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: audit/total-cleanup-2026-07-16
          fetch-depth: 0

      - name: Setup pinned .NET 11 preview
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 11.0.100-preview.6.26359.118

      - name: Remove lab-only browser blocker from clean product state
        shell: pwsh
        run: |
          $path = 'src/OneBrain.Pilot/MissionControlProductShellEndpointMapper.cs'
          $lines = [Collections.Generic.List[string]](Get-Content $path)

          $runtimeIndex = $lines.IndexOf('        var browserRuntime = fixture?.Inspector.Browser.Runtime ?? "CloakBrowser";')
          if ($runtimeIndex -lt 0 -or
              $lines[$runtimeIndex + 1] -ne '        var browserState = fixture?.Inspector.Browser.State ?? "BLOCKED_EXTERNAL_CLOAKBROWSER_BINARY";' -or
              $lines[$runtimeIndex + 2] -ne '        var browserLastError = fixture?.Inspector.Browser.LastError ?? "Pinned CloakBrowser runtime binary is not provisioned in this environment.";') {
            throw 'Expected browser fallback block was not found.'
          }
          $lines[$runtimeIndex] = '        var browserRuntime = fixture?.Inspector.Browser.Runtime ?? "Not configured";'
          $lines[$runtimeIndex + 1] = '        var browserState = fixture?.Inspector.Browser.State ?? "Not evaluated";'
          $lines.RemoveAt($runtimeIndex + 2)

          $browserId = -1
          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i].Trim() -eq '"browser",') { $browserId = $i; break }
          }
          if ($browserId -lt 1) { throw 'Browser context card was not found.' }
          $browserStart = $browserId - 1
          $initializerEnd = -1
          for ($i = $browserId; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -eq '        };') { $initializerEnd = $i; break }
          }
          if ($initializerEnd -lt 0) { throw 'Context initializer end was not found.' }
          if (-not $lines[$browserStart - 1].EndsWith('),')) { throw 'Advisor context terminator was not found.' }
          $lines[$browserStart - 1] = $lines[$browserStart - 1].Substring(0, $lines[$browserStart - 1].Length - 1)
          for ($i = $initializerEnd - 1; $i -ge $browserStart; $i--) { $lines.RemoveAt($i) }
          $initializerEnd = $lines.IndexOf('        };', $browserStart)
          $conditional = [string[]]@(
            '        if (fixture is not null)',
            '        {',
            '            context.Add(new MissionControlProductContextItem(',
            '                "browser",',
            '                browserRuntime,',
            '                browserState,',
            '                fixture.Inspector.Browser.LastError ?? "Browser runtime is healthy.",',
            '                browserState.Contains("BLOCKED", StringComparison.OrdinalIgnoreCase) ? "blocked" : "ready"));',
            '        }'
          )
          $lines.InsertRange($initializerEnd + 1, $conditional)
          [IO.File]::WriteAllLines($path, $lines, [Text.UTF8Encoding]::new($false))

          $testPath = 'tests/OneBrain.Recipes.Tests/MissionControlProductShellSelectiveRuntimeInspectorRouteTests.cs'
          $testLines = [Collections.Generic.List[string]](Get-Content $testPath)
          $anchor = '        Assert.IsFalse(html.Contains("Abrir laboratorio Pilot legado", StringComparison.Ordinal));'
          $anchorIndex = $testLines.IndexOf($anchor)
          if ($anchorIndex -lt 0) { throw 'Mission Control clean-state test anchor was not found.' }
          $testLines.Insert($anchorIndex + 1, '        Assert.IsFalse(html.Contains("CloakBrowser", StringComparison.Ordinal));')
          $testLines.Insert($anchorIndex + 2, '        Assert.IsFalse(html.Contains("BLOCKED_EXTERNAL_CLOAKBROWSER_BINARY", StringComparison.Ordinal));')
          [IO.File]::WriteAllLines($testPath, $testLines, [Text.UTF8Encoding]::new($false))

          $smokePath = 'eng/ci/smoke-mission-control-root.ps1'
          $smoke = Get-Content $smokePath -Raw
          $oldSmoke = "'Probar ahora|fixture-fallback-chat|Primary fixture model|Fixture mission|Abrir laboratorio Pilot legado'"
          $newSmoke = "'Probar ahora|fixture-fallback-chat|Primary fixture model|Fixture mission|Abrir laboratorio Pilot legado|CloakBrowser|BLOCKED_EXTERNAL_CLOAKBROWSER_BINARY'"
          if (($smoke.Split($oldSmoke).Count - 1) -ne 1) { throw 'Mission Control smoke pattern was not found exactly once.' }
          [IO.File]::WriteAllText($smokePath, $smoke.Replace($oldSmoke, $newSmoke), [Text.UTF8Encoding]::new($false))

          $packagePath = 'eng/ci/smoke-desktop-package.ps1'
          $package = Get-Content $packagePath -Raw
          $oldPackage = "'fixture-fallback-chat|Primary fixture model|Abrir laboratorio Pilot legado'"
          $newPackage = "'fixture-fallback-chat|Primary fixture model|Abrir laboratorio Pilot legado|CloakBrowser|BLOCKED_EXTERNAL_CLOAKBROWSER_BINARY'"
          if (($package.Split($oldPackage).Count - 1) -ne 1) { throw 'Desktop package smoke pattern was not found exactly once.' }
          [IO.File]::WriteAllText($packagePath, $package.Replace($oldPackage, $newPackage), [Text.UTF8Encoding]::new($false))

      - name: Build and test the canonical product surface
        shell: pwsh
        run: |
          dotnet restore tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet build tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj --configuration Release --no-restore --verbosity minimal
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet test tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj --configuration Release --no-build --filter 'FullyQualifiedName~MissionControlProductShellSelectiveRuntimeInspectorRouteTests|FullyQualifiedName~NodalOsDesktopLaunchRuntimeTests' --logger 'console;verbosity=normal'
          exit $LASTEXITCODE

      - name: Smoke clean Mission Control
        shell: pwsh
        run: ./eng/ci/smoke-mission-control-root.ps1

      - name: Validate diff and remove one-shot workflow
        shell: pwsh
        run: |
          git diff --check
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          git rm .github/workflows/one-shot-product-surface-cleanup.yml

      - name: Commit validated surface cleanup
        shell: pwsh
        run: |
          git config user.name 'onediegopr'
          git config user.email '13628799+onediegopr@users.noreply.github.com'
          git add -A
          git commit -m 'fix(product): hide lab browser blocker from clean state'
          git push origin HEAD:audit/total-cleanup-2026-07-16
