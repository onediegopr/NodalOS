name: One-shot P4 wire desktop launch

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/one-shot-p4-wire-desktop-launch.yml'
      - 'eng/ci/patch-p4-desktop-launch.py'

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feature/productization-desktop-packaging-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/productization-desktop-packaging-v1
          fetch-depth: 0
          show-progress: false

      - name: Apply desktop launch integration
        shell: bash
        run: |
          set -euo pipefail
          python eng/ci/patch-p4-desktop-launch.py
          git rm eng/ci/patch-p4-desktop-launch.py
          git rm .github/workflows/one-shot-p4-wire-desktop-launch.yml
          git diff --check
          git config user.name 'nodal-os-ci'
          git config user.email 'nodal-os-ci@users.noreply.github.com'
          git add src/OneBrain.Pilot .github/workflows/selective-runtime-integration.yml
          git commit -m 'feat: wire packaged desktop launch into Pilot'
          git push origin HEAD:feature/productization-desktop-packaging-v1
