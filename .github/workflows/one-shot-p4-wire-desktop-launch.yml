name: One-shot P4 wire desktop launch diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/one-shot-p4-wire-desktop-launch.yml'
      - 'eng/ci/patch-p4-desktop-launch.py'

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'feature/productization-desktop-packaging-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/productization-desktop-packaging-v1
          fetch-depth: 1
          show-progress: false

      - name: Run patch helper without committing
        shell: bash
        run: |
          set +e
          python eng/ci/patch-p4-desktop-launch.py > patch.log 2>&1
          status=$?
          echo "$status" > patch-status.txt
          git diff --stat > patch-diff-stat.txt
          git diff --check > patch-diff-check.txt 2>&1
          cat patch.log
          exit 0

      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: p4-desktop-launch-patch-diagnostic
          path: |
            patch.log
            patch-status.txt
            patch-diff-stat.txt
            patch-diff-check.txt
          retention-days: 1
