name: One-shot .NET 10 path migration

on:
  push:
    branches:
      - build/migrate-dotnet-10-lts
    paths:
      - ".github/workflows/dotnet10-path-migration.yml"

permissions:
  contents: write

jobs:
  migrate-paths:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: build/migrate-dotnet-10-lts
          fetch-depth: 0

      - name: Align operational output paths and remove this one-shot workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = [
              Path("tools/onnx-ocr-probe-runner/Program.cs"),
              Path("stealth-engine/tests/bridge-integration.test.js"),
              Path("tests/OneBrain.Safety.Tests/NodalOsQaWindowRegionM307M309Tests.cs"),
              Path("tests/OneBrain.Safety.Tests/NodalOsRealQaWindowRegionM310M312Tests.cs"),
              Path("tests/OneBrain.Safety.Tests/NodalOsGuardedSyntheticTextOcrM212M214Tests.cs"),
              Path("tests/OneBrain.Safety.Tests/NodalOsOnnxOutOfProcessGuardM210Tests.cs"),
              Path("tests/OneBrain.Safety.Tests/NodalOsSyntheticImageRecognizerCropM283M285Tests.cs"),
              Path("tests/OneBrain.Safety.Tests/NodalOsSyntheticDetectorToRecognizerPipelineM286M288Tests.cs"),
              Path("tests/OneBrain.Safety.Tests/NodalOsSyntheticCropCalibrationM292M294Tests.cs"),
              Path("tests/OneBrain.Safety.Tests/NodalOsInternalControlledRealImageM301M303Tests.cs"),
              Path("tests/OneBrain.Safety.Tests/NodalOsPaddleOcrPreprocessingAlignmentM298M300Tests.cs"),
              Path("tests/OneBrain.Safety.Tests/NodalOsInternalControlledScreenRegionM304M306Tests.cs"),
              Path("tests/OneBrain.Safety.Tests/NodalOsOnnxSyntheticRecognizerDecodeProbeM280M282Tests.cs"),
              Path("tests/OneBrain.Safety.Tests/NodalOsDetectorModelRecoveryPipelineM289M291Tests.cs"),
          ]

          changed = []
          for path in paths:
              text = path.read_text(encoding="utf-8-sig")
              updated = text.replace("net11.0-windows", "net10.0-windows").replace("net11.0", "net10.0")
              if updated != text:
                  path.write_text(updated, encoding="utf-8")
                  changed.append(str(path))

          if not changed:
              raise SystemExit("No operational net11 output path was found to migrate.")

          Path(".github/workflows/dotnet10-path-migration.yml").unlink()
          print("Updated:")
          print("\n".join(changed))
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "fix: align supported-runtime executable paths"
          git push origin HEAD:build/migrate-dotnet-10-lts
