name: Tier 1 Safety

on:
  pull_request:
    branches:
      - chrome-lab-001-extension-local-ai-bridge
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tier1-safety-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromelab-security:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 11 preview
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 11.0.x
          dotnet-quality: preview

      - name: Restore ChromeLab and Safety
        shell: pwsh
        run: |
          dotnet restore src/OneBrain.ChromeLab.Bridge/OneBrain.ChromeLab.Bridge.csproj
          dotnet restore tests/OneBrain.Safety.Tests/OneBrain.Safety.Tests.csproj

      - name: Build ChromeLab bridge
        shell: pwsh
        run: dotnet build src/OneBrain.ChromeLab.Bridge/OneBrain.ChromeLab.Bridge.csproj --configuration Release --no-restore

      - name: Build Safety tests
        shell: pwsh
        run: dotnet build tests/OneBrain.Safety.Tests/OneBrain.Safety.Tests.csproj --configuration Release --no-restore

      - name: Run ChromeLab security and operator-surface tests
        shell: pwsh
        run: >-
          dotnet test tests/OneBrain.Safety.Tests/OneBrain.Safety.Tests.csproj
          --configuration Release
          --no-build
          --filter "FullyQualifiedName~ChromeLabBridgeSecurityTests|FullyQualifiedName~ChromeLabLocalDevOperatorSurface"
          --logger "console;verbosity=normal"
