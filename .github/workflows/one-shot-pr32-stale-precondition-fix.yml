name: One-shot PR32 stale precondition fix

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/one-shot-pr32-stale-precondition-fix.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/productization-controlled-handoff-execution-v1
          fetch-depth: 0

      - name: Apply and commit stale precondition decision fix
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('src/OneBrain.AgentOperations.Core/Workspace/NodalOsWorkspaceHandoffExecution.cs')
          text = path.read_text(encoding='utf-8')
          marker = 'var draft = await missionDraft.GetCurrentAsync(cancellationToken).ConfigureAwait(false);'
          stale_guard = 'if (draft.Candidate?.State == NodalOsReviewedWorkspaceActionState.StalePrecondition)'
          if stale_guard not in text:
              index = text.index(marker)
              line_start = text.rfind('\n', 0, index) + 1
              indent = text[line_start:index]
              insert_at = text.index('\n', index) + 1
              block = (
                  f'{indent}if (draft.Candidate?.State == NodalOsReviewedWorkspaceActionState.StalePrecondition)\n'
                  f'{indent}{{\n'
                  f'{indent}    return Failure(\n'
                  f'{indent}        "BLOCKED_WORKSPACE_HANDOFF_EXECUTION_PRECONDITION_CHANGED",\n'
                  f'{indent}        NodalOsWorkspaceHandoffExecutionState.CandidateStale,\n'
                  f'{indent}        draft.ReviewBlockers.DefaultIfEmpty("The reviewed target precondition changed before approval.").ToArray());\n'
                  f'{indent}}}\n'
              )
              text = text[:insert_at] + block + text[insert_at:]
              path.write_text(text, encoding='utf-8')
          PY
          git status --short
          git config user.name 'nodal-os-ci'
          git config user.email 'nodal-os-ci@users.noreply.github.com'
          git add src/OneBrain.AgentOperations.Core/Workspace/NodalOsWorkspaceHandoffExecution.cs
          git diff --cached --quiet && { echo 'No source change was produced.'; exit 1; }
          git commit -m 'fix: preserve stale handoff precondition decision'
          git push origin HEAD:feature/productization-controlled-handoff-execution-v1
