name: One-shot P5 recovery validation

on:
  push:
    branches:
      - feature/productization-private-beta-recovery-guidance-v1
    paths:
      - '.github/workflows/one-shot-p5-recovery-validation.yml'
      - 'src/OneBrain.Pilot/MissionControlProductShellHtmlRenderer.cs'
      - 'tests/OneBrain.Recipes.Tests/MissionControlProductShellOnboardingTests.cs'

permissions:
  contents: write

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/productization-private-beta-recovery-guidance-v1
          fetch-depth: 0

      - name: Setup pinned .NET 11 preview
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 11.0.100-preview.6.26359.118

      - name: Build, test and smoke the focused product slice
        id: validate
        shell: pwsh
        continue-on-error: true
        run: |
          $ErrorActionPreference = 'Stop'
          $status = 'PASS'
          $failure = $null
          $log = Join-Path $env:RUNNER_TEMP 'p5-recovery-validation.log'
          try {
            dotnet restore tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj 2>&1 | Tee-Object -FilePath $log
            if ($LASTEXITCODE -ne 0) { throw "restore failed with exit code $LASTEXITCODE" }

            dotnet build tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj --configuration Release --no-restore --verbosity minimal 2>&1 | Tee-Object -FilePath $log -Append
            if ($LASTEXITCODE -ne 0) { throw "build failed with exit code $LASTEXITCODE" }

            dotnet test tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj --configuration Release --no-build --filter "FullyQualifiedName~MissionControlProductShellSelectiveRuntimeInspectorRouteTests" --logger "console;verbosity=normal" 2>&1 | Tee-Object -FilePath $log -Append
            if ($LASTEXITCODE -ne 0) { throw "focused tests failed with exit code $LASTEXITCODE" }

            ./eng/ci/smoke-mission-control-root.ps1 2>&1 | Tee-Object -FilePath $log -Append
            if ($LASTEXITCODE -ne 0) { throw "Mission Control smoke failed with exit code $LASTEXITCODE" }
          }
          catch {
            $status = 'FAIL'
            $failure = $_.Exception.Message
          }

          New-Item -ItemType Directory -Path '.github/validation' -Force | Out-Null
          [ordered]@{
            schemaVersion = 1
            status = $status
            headSha = '${{ github.sha }}'
            validatedAtUtc = [DateTimeOffset]::UtcNow.ToString('O')
            scope = 'Mission Control recovery guidance renderer, focused route tests and process smoke'
            commands = @(
              'dotnet restore tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj',
              'dotnet build tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj --configuration Release --no-restore',
              'dotnet test tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj --configuration Release --no-build --filter FullyQualifiedName~MissionControlProductShellSelectiveRuntimeInspectorRouteTests',
              './eng/ci/smoke-mission-control-root.ps1'
            )
            failure = $failure
          } | ConvertTo-Json -Depth 4 | Set-Content '.github/validation/p5-recovery-guidance.json' -Encoding utf8

          "status=$status" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          if ($status -ne 'PASS') {
            Get-Content $log -Tail 120 -ErrorAction SilentlyContinue
          }

      - name: Commit validation result
        shell: pwsh
        run: |
          git config user.name 'nodal-os-ci'
          git config user.email 'nodal-os-ci@users.noreply.github.com'
          git add .github/validation/p5-recovery-guidance.json
          git commit -m 'chore(ci): record recovery guidance validation'
          git push origin HEAD:feature/productization-private-beta-recovery-guidance-v1

      - name: Enforce validation result
        if: steps.validate.outputs.status != 'PASS'
        shell: pwsh
        run: exit 1
