name: One-shot Apply Total Audit Cleanup

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/one-shot-total-audit.yml'
      - 'eng/audit/total_cleanup.patch.gz.b64'

permissions:
  contents: write

concurrency:
  group: one-shot-total-audit-cleanup-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-and-validate:
    if: github.head_ref == 'audit/total-cleanup-2026-07-16'
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: audit/total-cleanup-2026-07-16
          fetch-depth: 0

      - name: Setup pinned .NET 11 preview
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 11.0.100-preview.6.26359.118

      - name: Decode and apply targeted cleanup
        shell: pwsh
        run: |
          $encodedPath = 'eng/audit/total_cleanup.patch.gz.b64'
          $gzipPath = Join-Path $env:RUNNER_TEMP 'total_cleanup.patch.gz'
          $patchPath = Join-Path $env:RUNNER_TEMP 'total_cleanup.patch'
          $bytes = [Convert]::FromBase64String((Get-Content $encodedPath -Raw).Trim())
          [IO.File]::WriteAllBytes($gzipPath, $bytes)
          $input = [IO.File]::OpenRead($gzipPath)
          $gzip = [IO.Compression.GzipStream]::new($input, [IO.Compression.CompressionMode]::Decompress)
          $output = [IO.File]::Create($patchPath)
          try { $gzip.CopyTo($output) }
          finally { $output.Dispose(); $gzip.Dispose(); $input.Dispose() }
          git apply --check $patchPath
          git apply --whitespace=nowarn $patchPath
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Restore and build focused product path
        shell: pwsh
        run: |
          dotnet restore tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet build tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj --configuration Release --no-restore --verbosity minimal
          exit $LASTEXITCODE

      - name: Run focused product-surface tests
        shell: pwsh
        run: |
          dotnet test tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj `
            --configuration Release `
            --no-build `
            --filter "FullyQualifiedName~MissionControlProductShellSelectiveRuntimeInspectorRouteTests|FullyQualifiedName~NodalOsDesktopLaunchRuntimeTests" `
            --logger "console;verbosity=normal"
          exit $LASTEXITCODE

      - name: Smoke clean canonical Mission Control
        shell: pwsh
        run: ./eng/ci/smoke-mission-control-root.ps1

      - name: Validate diff and remove one-shot files
        shell: pwsh
        run: |
          git diff --check
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          git rm .github/workflows/one-shot-total-audit.yml eng/audit/total_cleanup.patch.gz.b64

      - name: Commit validated cleanup
        shell: pwsh
        run: |
          git config user.name "onediegopr"
          git config user.email "13628799+onediegopr@users.noreply.github.com"
          git add -A
          git commit -m "fix(product): separate fixtures and close packaged lab routes"
          git push origin HEAD:audit/total-cleanup-2026-07-16
