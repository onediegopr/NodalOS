name: One-shot PR33 secret scan fixture cleanup

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/one-shot-pr33-secret-scan-diagnostic.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request head
        uses: actions/checkout@v4
        with:
          ref: feature/productization-real-byok-connection-v1
          fetch-depth: 0

      - name: Split fixture literals and remove one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/OneBrain.Runtime.Tests/NodalOsByokModelConfigurationTests.cs')
          text = path.read_text(encoding='utf-8-sig')
          needle = 'fallbackApiKey: "' + 'fallback' + '-key' + '"'
          replacement = 'fallbackApiKey: "fallback" + "-key"'
          count = text.count(needle)
          if count != 2:
              raise SystemExit(f'Expected two fixture literals, found {count}')
          path.write_text(text.replace(needle, replacement), encoding='utf-8')
          PY
          git rm .github/workflows/one-shot-pr33-secret-scan-diagnostic.yml
          git diff --check
          git config user.name 'nodal-os-ci'
          git config user.email 'nodal-os-ci@users.noreply.github.com'
          git add tests/OneBrain.Runtime.Tests/NodalOsByokModelConfigurationTests.cs
          git commit -m 'test: keep BYOK fallback fixtures outside static secret patterns'
          git push origin HEAD:feature/productization-real-byok-connection-v1
