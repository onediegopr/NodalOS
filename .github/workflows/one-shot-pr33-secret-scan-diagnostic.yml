name: One-shot PR33 secret scan diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/one-shot-pr33-secret-scan-diagnostic.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request head
        uses: actions/checkout@v4
        with:
          ref: feature/productization-real-byok-connection-v1
          fetch-depth: 0

      - name: Record exact Tier 1 static findings
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          python - <<'PY'
          import re
          import subprocess
          from pathlib import Path

          diff = subprocess.check_output(
              [
                  'git', 'diff', '--diff-filter=ACMR', '--no-ext-diff', '--unified=0',
                  'origin/main', 'HEAD'
              ],
              text=True,
              errors='replace',
          )
          patterns = [
              re.compile(r'-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----'),
              re.compile(r'AKIA[0-9A-Z]{16}'),
              re.compile(r'gh[pousr]_[A-Za-z0-9]{30,}'),
              re.compile(r'sk-[A-Za-z0-9_-]{20,}'),
              re.compile(r'(?i)(?:api[_-]?key|secret|password|token)\s*[:=]\s*[\"\'][^\"\']{12,}[\"\']'),
              re.compile(r'(?:nexa|nodal)_[0-9a-fA-F]{32,}'),
          ]
          findings = []
          current_path = ''
          for line in diff.splitlines():
              if line.startswith('+++ b/'):
                  current_path = line[6:]
                  continue
              if line.startswith('+++'):
                  current_path = ''
                  continue
              if not line.startswith('+'):
                  continue
              value = line[1:]
              if any(pattern.search(value) for pattern in patterns):
                  findings.append(f'{current_path}: {value[:500]}')

          Path('secret-scan-findings.txt').write_text(
              '\n'.join(findings) + ('\n' if findings else ''),
              encoding='utf-8',
          )
          print(f'findings={len(findings)}')
          PY

      - name: Upload findings
        uses: actions/upload-artifact@v4
        with:
          name: pr33-secret-scan-findings
          path: secret-scan-findings.txt
          retention-days: 1
