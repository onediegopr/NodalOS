name: Desktop Package

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/OneBrain.Pilot/**"
      - "src/OneBrain.Core/**"
      - "src/OneBrain.Actions/**"
      - "src/OneBrain.Observation/**"
      - "src/OneBrain.AgentOperations.Core/**"
      - "tests/OneBrain.Recipes.Tests/**"
      - "eng/packaging/**"
      - "eng/ci/smoke-desktop-package.ps1"
      - ".github/workflows/desktop-package.yml"
      - "global.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-private-beta-package:
    runs-on: windows-latest
    timeout-minutes: 55
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pinned .NET 11 preview
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 11.0.100-preview.6.26359.118

      - name: Restore package and test projects
        shell: pwsh
        run: |
          dotnet restore src/OneBrain.Pilot/OneBrain.Pilot.csproj
          dotnet restore tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj

      - name: Build packaged launch boundary
        shell: pwsh
        run: |
          dotnet build src/OneBrain.Pilot/OneBrain.Pilot.csproj --configuration Release --no-restore --verbosity minimal
          dotnet build tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj --configuration Release --no-restore --verbosity minimal

      - name: Run desktop launch tests
        shell: pwsh
        run: |
          dotnet test tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj `
            --configuration Release `
            --no-build `
            --filter "FullyQualifiedName~NodalOsDesktopLaunchRuntimeTests" `
            --logger "console;verbosity=normal"

      - name: Build, install, launch, verify and uninstall MSIX
        id: package_smoke
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP "nodal-desktop-package-smoke.log"
          ./eng/ci/smoke-desktop-package.ps1 2>&1 | Tee-Object -FilePath $log
          exit $LASTEXITCODE

      - name: Upload private-beta package and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nodal-os-private-beta-msix
          path: |
            ${{ runner.temp }}/nodal-desktop-package/**
            ${{ runner.temp }}/nodal-desktop-package-smoke.log
          if-no-files-found: warn
          retention-days: 7
