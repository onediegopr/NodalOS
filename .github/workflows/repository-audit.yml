name: Repository Audit Inventory

on:
  pull_request:
    branches:
      - main
    paths:
      - "eng/audit/**"
      - "tools/repository/clean-unreferenced-artifacts.ps1"
      - "global.json"
      - ".github/workflows/repository-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run deterministic repository inventory
        run: python eng/audit/repository_audit.py

      - name: Upload repository audit inventory
        uses: actions/upload-artifact@v4
        with:
          name: repository-audit-inventory
          path: artifacts/repository-audit
          if-no-files-found: error
          retention-days: 7

  dependency-inventory:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pinned .NET 10 LTS
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.302

      - name: Restore solution
        shell: pwsh
        run: dotnet restore OneBrain.slnx

      - name: Inventory vulnerable and deprecated packages
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP "dependency-audit.log"
          "# Vulnerable packages" | Set-Content $log
          dotnet list OneBrain.slnx package --vulnerable --include-transitive 2>&1 | Tee-Object -FilePath $log -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          "`n# Deprecated packages" | Add-Content $log
          dotnet list OneBrain.slnx package --deprecated 2>&1 | Tee-Object -FilePath $log -Append
          exit $LASTEXITCODE

      - name: Upload dependency audit
        uses: actions/upload-artifact@v4
        with:
          name: repository-dependency-audit
          path: ${{ runner.temp }}/dependency-audit.log
          if-no-files-found: error
          retention-days: 7

  artifact-projection:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Project reference-aware artifact cleanup without applying it
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP "artifact-cleanup-dry-run.log"
          ./tools/repository/clean-unreferenced-artifacts.ps1 2>&1 | Tee-Object -FilePath $log
          exit $LASTEXITCODE

      - name: Upload artifact cleanup projection
        uses: actions/upload-artifact@v4
        with:
          name: repository-artifact-cleanup-projection
          path: |
            docs/audit/artifact-cleanup-report.md
            ${{ runner.temp }}/artifact-cleanup-dry-run.log
          if-no-files-found: error
          retention-days: 7
