name: One-shot P4 product data root

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/one-shot-p4-product-root.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feature/productization-desktop-packaging-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/productization-desktop-packaging-v1
          fetch-depth: 0
          show-progress: false

      - name: Wire writable packaged data root
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace(path: Path, old: str, new: str) -> None:
              text = path.read_text(encoding='utf-8-sig')
              if text.count(old) != 1:
                  raise SystemExit(f'{path}: expected one occurrence of {old!r}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          program = Path('src/OneBrain.Pilot/Program.cs')
          replace(
              program,
              'var root = ResolveRepoRoot(GetArg(args, "--root") ?? Directory.GetCurrentDirectory());',
              'var requestedRoot = GetArg(args, "--root");\nvar root = packaged\n    ? NodalOsDesktopLaunchRuntime.ResolveProductDataRoot(requestedRoot)\n    : ResolveRepoRoot(requestedRoot ?? Directory.GetCurrentDirectory());')

          tests = Path('tests/OneBrain.Recipes.Tests/NodalOsDesktopLaunchRuntimeTests.cs')
          marker = '    [TestMethod]\n    public void ResolveLoopbackUrlsAcceptsOnlyLocalHttpOrigins()\n'
          block = '''    [TestMethod]
          public void ResolveProductDataRootUsesWritableLocalApplicationData()
          {
              var baseDirectory = Path.Combine(Path.GetTempPath(), "nodal-os-product-data-tests", Guid.NewGuid().ToString("N"));
              try
              {
                  var root = NodalOsDesktopLaunchRuntime.ResolveProductDataRoot(localApplicationData: baseDirectory);

                  Assert.AreEqual(Path.Combine(baseDirectory, "NodalOS", "ProductData"), root);
                  Assert.IsTrue(Directory.Exists(root));
              }
              finally
              {
                  if (Directory.Exists(baseDirectory))
                      Directory.Delete(baseDirectory, recursive: true);
              }
          }

          '''
          text = tests.read_text(encoding='utf-8-sig')
          if text.count(marker) != 1:
              raise SystemExit('Desktop test insertion marker was not unique.')
          tests.write_text(text.replace(marker, block + marker, 1), encoding='utf-8')
          PY

          git rm .github/workflows/one-shot-p4-product-root.yml
          git diff --check
          git config user.name 'nodal-os-ci'
          git config user.email 'nodal-os-ci@users.noreply.github.com'
          git add src/OneBrain.Pilot/Program.cs tests/OneBrain.Recipes.Tests/NodalOsDesktopLaunchRuntimeTests.cs
          git commit -m 'fix: keep packaged Pilot state in writable local data'
          git push origin HEAD:feature/productization-desktop-packaging-v1
