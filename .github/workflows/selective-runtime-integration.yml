name: Selective Runtime Integration

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/OneBrain.Core/**"
      - "src/OneBrain.AgentOperations.Core/**"
      - "src/OneBrain.Pilot/**"
      - "tests/OneBrain.Runtime.Tests/**"
      - "tests/OneBrain.Recipes.Tests/**"
      - ".github/workflows/selective-runtime-integration.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: selective-runtime-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime-integration:
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 11 preview
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 11.0.x
          dotnet-quality: preview

      - name: Restore focused projects
        shell: pwsh
        run: |
          dotnet restore tests/OneBrain.Runtime.Tests/OneBrain.Runtime.Tests.csproj
          dotnet restore tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj

      - name: Build runtime and Pilot surfaces
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP "selective-runtime-integration-build.log"
          dotnet build tests/OneBrain.Runtime.Tests/OneBrain.Runtime.Tests.csproj --configuration Release --no-restore --verbosity minimal 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet build tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj --configuration Release --no-restore --verbosity minimal 2>&1 | Tee-Object -FilePath $log -Append
          exit $LASTEXITCODE

      - name: Run selective runtime tests
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP "selective-runtime-integration-test.log"
          dotnet test tests/OneBrain.Runtime.Tests/OneBrain.Runtime.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal" 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet test tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj --configuration Release --no-build --filter "FullyQualifiedName~AIModelConfigurationTests|FullyQualifiedName~PilotAIConfigConsoleTests|FullyQualifiedName~SelectiveRuntimeInspectorRouteTests|FullyQualifiedName~TestOwnedFileCreateRouteTests|FullyQualifiedName~TestOwnedFileUpdateRouteTests|FullyQualifiedName~BoundedWorkspaceUnderstandingRouteTests|FullyQualifiedName~BoundedWorkspaceHandoffExportRouteTests" --logger "console;verbosity=normal" 2>&1 | Tee-Object -FilePath $log -Append
          exit $LASTEXITCODE

      - name: Smoke Pilot product loops
        shell: pwsh
        run: |
          $env:ASPNETCORE_ENVIRONMENT = "Development"
          $workspaceRoot = Join-Path $env:RUNNER_TEMP "nodal-workspace-operator-fixture"
          if (Test-Path $workspaceRoot) { Remove-Item $workspaceRoot -Recurse -Force }
          New-Item -ItemType Directory -Path (Join-Path $workspaceRoot "src") -Force | Out-Null
          [System.IO.File]::WriteAllText((Join-Path $workspaceRoot "README.md"), "# Bounded workspace smoke fixture")
          $fakeSecret = "s" + "k-workspace-fixture-secret-value-123456789"
          [System.IO.File]::WriteAllText(
            (Join-Path $workspaceRoot "src/Program.cs"),
            ('var api_key = "{0}";{1}Console.WriteLine("fixture");' -f $fakeSecret, [Environment]::NewLine)
          )
          $env:NODAL_OS_WORKSPACE_ROOT = $workspaceRoot
          $env:NODAL_OS_ADVISOR_PROFILE = "Balanced"
          $env:NODAL_OS_ADVISOR_INTERVENTION_LEVEL = "50"
          $stdout = Join-Path $env:RUNNER_TEMP "pilot-runtime-inspector.stdout.log"
          $stderr = Join-Path $env:RUNNER_TEMP "pilot-runtime-inspector.stderr.log"
          $process = Start-Process dotnet -ArgumentList @(
            "run",
            "--project", "src/OneBrain.Pilot/OneBrain.Pilot.csproj",
            "--configuration", "Release",
            "--no-build",
            "--",
            "--urls", "http://127.0.0.1:5097"
          ) -PassThru -RedirectStandardOutput $stdout -RedirectStandardError $stderr
          try {
            $ready = $false
            for ($attempt = 0; $attempt -lt 30; $attempt++) {
              if ($process.HasExited) { throw "Pilot exited before the inspector became ready." }
              try {
                $snapshot = Invoke-RestMethod -Uri "http://127.0.0.1:5097/api/runtime/inspector" -TimeoutSec 2
                $ready = $true
                break
              }
              catch {
                Start-Sleep -Seconds 1
              }
            }
            if (-not $ready) { throw "Pilot Runtime Inspector did not become ready." }
            if (-not $snapshot.localDevOnly -or -not $snapshot.readOnly -or -not $snapshot.secretsExcluded) {
              throw "Runtime Inspector boundary flags are invalid."
            }
            if ($snapshot.missionStatus -ne "Completed") { throw "Fixture mission did not complete." }
            $response = Invoke-WebRequest -Uri "http://127.0.0.1:5097/runtime/inspector" -TimeoutSec 5
            if ($response.StatusCode -ne 200) { throw "Runtime Inspector HTML did not return 200." }
            if ($response.Headers["Cache-Control"] -notmatch "no-store") { throw "Runtime Inspector must be no-store." }
            if ($response.Content -notmatch 'data-nodal-os="runtime-inspector"') { throw "Runtime Inspector anchor missing." }
            if ($response.Content -match '<script|<form|https?://') { throw "Runtime Inspector opened an executable or external surface." }

            $fileSnapshot = Invoke-RestMethod -Uri "http://127.0.0.1:5097/api/runtime/file-create-fixture" -TimeoutSec 10
            if (-not $fileSnapshot.localDevOnly -or -not $fileSnapshot.readOnlySurface -or -not $fileSnapshot.secretsExcluded) {
              throw "Create-only fixture boundary flags are invalid."
            }
            if ($fileSnapshot.missionStatus -ne "Completed" -or $fileSnapshot.registryState -ne "Completed") {
              throw "Create-only fixture mission did not complete."
            }
            if ($fileSnapshot.approvalStatus -ne "Approve" -or $fileSnapshot.fileCreateState -ne "CreatedAndVerified") {
              throw "Create-only fixture approval or action state is invalid."
            }
            if (-not $fileSnapshot.fileCreateVerified -or -not $fileSnapshot.testOwnedFixtureCleaned) {
              throw "Create-only fixture verification or cleanup failed."
            }
            if ($fileSnapshot.userWorkspaceFilesystemTouched -or $fileSnapshot.networkUsed -or $fileSnapshot.productAuthorityGranted) {
              throw "Create-only fixture crossed a forbidden boundary."
            }
            $fileResponse = Invoke-WebRequest -Uri "http://127.0.0.1:5097/runtime/file-create-fixture" -TimeoutSec 10
            if ($fileResponse.StatusCode -ne 200) { throw "Create-only fixture HTML did not return 200." }
            if ($fileResponse.Headers["Cache-Control"] -notmatch "no-store") { throw "Create-only fixture surface must be no-store." }
            if ($fileResponse.Content -notmatch 'data-nodal-os="test-owned-file-create"') { throw "Create-only fixture anchor missing." }
            if ($fileResponse.Content -match '<script|<form|https?://') { throw "Create-only fixture opened an executable or external surface." }

            $updateSnapshot = Invoke-RestMethod -Uri "http://127.0.0.1:5097/api/runtime/file-update-fixture" -TimeoutSec 15
            if (-not $updateSnapshot.localDevOnly -or -not $updateSnapshot.readOnlySurface -or -not $updateSnapshot.secretsExcluded) {
              throw "Exact-hash update fixture boundary flags are invalid."
            }
            if ($updateSnapshot.missionStatus -ne "Completed" -or $updateSnapshot.registryState -ne "Completed") {
              throw "Exact-hash update fixture mission did not complete."
            }
            if ($updateSnapshot.approvalStatus -ne "Approve" -or $updateSnapshot.fileUpdateState -ne "UpdatedAndVerified") {
              throw "Exact-hash update approval or action state is invalid."
            }
            if (-not $updateSnapshot.fileUpdateVerified -or
                -not $updateSnapshot.preconditionMatched -or
                -not $updateSnapshot.snapshotCreated -or
                -not $updateSnapshot.atomicReplaceUsed -or
                -not $updateSnapshot.rollbackPlanCreated -or
                -not $updateSnapshot.fixtureCleanupRemovedRollbackSnapshot -or
                -not $updateSnapshot.testOwnedFixtureCleaned) {
              throw "Exact-hash update verification, restore plan or cleanup failed."
            }
            if ($updateSnapshot.originalSha256.Length -ne 64 -or
                $updateSnapshot.updatedSha256.Length -ne 64 -or
                $updateSnapshot.originalSha256 -eq $updateSnapshot.updatedSha256) {
              throw "Exact-hash update evidence is invalid."
            }
            if ($updateSnapshot.userWorkspaceFilesystemTouched -or $updateSnapshot.networkUsed -or $updateSnapshot.productAuthorityGranted) {
              throw "Exact-hash update crossed a forbidden boundary."
            }
            $updateResponse = Invoke-WebRequest -Uri "http://127.0.0.1:5097/runtime/file-update-fixture" -TimeoutSec 15
            if ($updateResponse.StatusCode -ne 200) { throw "Exact-hash update HTML did not return 200." }
            if ($updateResponse.Headers["Cache-Control"] -notmatch "no-store") { throw "Exact-hash update surface must be no-store." }
            if ($updateResponse.Headers["Content-Security-Policy"] -notmatch "default-src 'none'") { throw "Exact-hash update CSP is missing." }
            if ($updateResponse.Content -notmatch 'data-nodal-os="test-owned-file-update"' -or
                $updateResponse.Content -notmatch 'data-section-id="rollback"' -or
                $updateResponse.Content -notmatch 'UpdatedAndVerified' -or
                $updateResponse.Content -notmatch 'General patch') {
              throw "Exact-hash update surface is incomplete."
            }
            if ($updateResponse.Content -match '<script|<form|onclick=|https?://') { throw "Exact-hash update opened an executable or external surface." }
            if ($updateResponse.Content.IndexOf($workspaceRoot, [StringComparison]::OrdinalIgnoreCase) -ge 0 -or
                $updateResponse.Content.IndexOf($fakeSecret, [StringComparison]::OrdinalIgnoreCase) -ge 0) {
              throw "Exact-hash update leaked a workspace root or secret."
            }

            $workspaceJsonResponse = Invoke-WebRequest -Uri "http://127.0.0.1:5097/api/workspace/understanding" -TimeoutSec 15
            if ($workspaceJsonResponse.StatusCode -ne 200) { throw "Bounded workspace JSON did not return 200." }
            if ($workspaceJsonResponse.Headers["Cache-Control"] -notmatch "no-store") { throw "Bounded workspace JSON must be no-store." }
            $workspaceSnapshot = $workspaceJsonResponse.Content | ConvertFrom-Json
            if (-not $workspaceSnapshot.accepted -or -not $workspaceSnapshot.localDevOnly -or -not $workspaceSnapshot.readOnly -or -not $workspaceSnapshot.secretsExcluded) {
              throw "Bounded workspace boundary flags are invalid."
            }
            if ($workspaceSnapshot.missionStatus -ne "Completed") { throw "Bounded workspace mission did not complete." }
            if ($workspaceSnapshot.planDecision -ne "GO_BOUNDED_WORKSPACE_CONTEXT_READY_FOR_REVIEWED_PLAN") {
              throw "Bounded workspace reviewed plan was not produced."
            }
            if ($workspaceSnapshot.advisorDecision -ne "GO_EXPERT_ADVISOR_SUGGESTIONS_READY" -or
                $workspaceSnapshot.advisorProfile -ne "Balanced" -or
                $workspaceSnapshot.advisorInterventionLevel -ne 50 -or
                -not $workspaceSnapshot.advisorNonExecutor -or
                $workspaceSnapshot.advisorSuggestions.Count -lt 1) {
              throw "Bounded workspace advisor projection is invalid."
            }
            if ($workspaceSnapshot.advisorSuggestions.Where({ -not $_.nonExecutable -or $_.canAuthorizeExecution }).Count -ne 0) {
              throw "Bounded workspace advisor exposed executable or authoritative suggestions."
            }
            if ($workspaceSnapshot.filesystemMutationAllowed -or $workspaceSnapshot.networkUsed -or $workspaceSnapshot.productAuthorityGranted) {
              throw "Bounded workspace crossed a forbidden boundary."
            }
            if ($workspaceSnapshot.evidenceDigest.Length -ne 64 -or $workspaceSnapshot.planSteps.Count -lt 1) {
              throw "Bounded workspace evidence or plan is incomplete."
            }
            if ($workspaceJsonResponse.Content.IndexOf($workspaceRoot, [StringComparison]::OrdinalIgnoreCase) -ge 0 -or
                $workspaceJsonResponse.Content.IndexOf($fakeSecret, [StringComparison]::OrdinalIgnoreCase) -ge 0) {
              throw "Bounded workspace JSON leaked a root path or secret."
            }
            $workspaceResponse = Invoke-WebRequest -Uri "http://127.0.0.1:5097/workspace/understanding" -TimeoutSec 15
            if ($workspaceResponse.StatusCode -ne 200) { throw "Bounded workspace HTML did not return 200." }
            if ($workspaceResponse.Headers["Cache-Control"] -notmatch "no-store") { throw "Bounded workspace HTML must be no-store." }
            if ($workspaceResponse.Headers["Content-Security-Policy"] -notmatch "default-src 'none'") { throw "Bounded workspace CSP is missing." }
            if ($workspaceResponse.Content -notmatch 'data-nodal-os="bounded-workspace-understanding"') { throw "Bounded workspace anchor missing." }
            if ($workspaceResponse.Content -notmatch 'data-section-id="plan"' -or
                $workspaceResponse.Content -notmatch 'data-section-id="advisor"') {
              throw "Bounded workspace plan or advisor section is missing."
            }
            if ($workspaceResponse.Content -notmatch 'Expert Advisor' -or
                $workspaceResponse.Content -notmatch 'non-executor') {
              throw "Bounded workspace advisor copy is missing."
            }
            if ($workspaceResponse.Content -match '<script|<form|onclick=|https?://') { throw "Bounded workspace opened an executable or external surface." }
            if ($workspaceResponse.Content.IndexOf($workspaceRoot, [StringComparison]::OrdinalIgnoreCase) -ge 0 -or
                $workspaceResponse.Content.IndexOf($fakeSecret, [StringComparison]::OrdinalIgnoreCase) -ge 0) {
              throw "Bounded workspace HTML leaked a root path or secret."
            }

            $handoffJsonResponse = Invoke-WebRequest -Uri "http://127.0.0.1:5097/api/workspace/understanding/handoff" -TimeoutSec 15
            if ($handoffJsonResponse.StatusCode -ne 200) { throw "Workspace handoff JSON did not return 200." }
            if ($handoffJsonResponse.Headers["Cache-Control"] -notmatch "no-store") { throw "Workspace handoff JSON must be no-store." }
            $handoffSnapshot = $handoffJsonResponse.Content | ConvertFrom-Json
            if (-not $handoffSnapshot.accepted -or -not $handoffSnapshot.localDevOnly -or -not $handoffSnapshot.readOnly -or -not $handoffSnapshot.secretsExcluded) {
              throw "Workspace handoff boundary flags are invalid."
            }
            if ($handoffSnapshot.missionStatus -ne "Completed" -or
                $handoffSnapshot.decision -ne "GO_BOUNDED_WORKSPACE_ADVISOR_HANDOFF_EXPORT_READY") {
              throw "Workspace advisor handoff did not reach the verified export state."
            }
            if (-not $handoffSnapshot.deterministic -or $handoffSnapshot.containsRawPayload -or $handoffSnapshot.containsExternalResource) {
              throw "Workspace handoff render safety flags are invalid."
            }
            if ($handoffSnapshot.advisorDecision -ne "GO_EXPERT_ADVISOR_SUGGESTIONS_READY" -or
                $handoffSnapshot.advisorProfile -ne "Balanced" -or
                $handoffSnapshot.advisorInterventionLevel -ne 50 -or
                $handoffSnapshot.advisorSuggestionCount -lt 1 -or
                -not $handoffSnapshot.advisorFindingsIncluded -or
                -not $handoffSnapshot.advisorNonExecutor) {
              throw "Workspace handoff advisor metadata is invalid."
            }
            if ($handoffSnapshot.advisorFindings.Where({ -not $_.nonExecutable -or $_.canAuthorizeExecution }).Count -ne 0) {
              throw "Workspace handoff included executable or authoritative advisor findings."
            }
            if ($handoffSnapshot.isAuthoritative -or $handoffSnapshot.executable -or $handoffSnapshot.filesystemMutationAllowed -or $handoffSnapshot.networkUsed -or $handoffSnapshot.productAuthorityGranted) {
              throw "Workspace handoff crossed a forbidden boundary."
            }
            if ($handoffSnapshot.evidenceDigest.Length -ne 64 -or $handoffSnapshot.evidenceRefs.Count -lt 1) {
              throw "Workspace handoff evidence is incomplete."
            }
            if ($handoffSnapshot.markdownRedacted -notmatch 'NODAL OS Bounded Workspace Handoff' -or
                $handoffSnapshot.markdownRedacted -notmatch 'Expert Advisor findings') {
              throw "Workspace handoff markdown is missing canonical or advisor sections."
            }
            if ($handoffJsonResponse.Content.IndexOf($workspaceRoot, [StringComparison]::OrdinalIgnoreCase) -ge 0 -or
                $handoffJsonResponse.Content.IndexOf($fakeSecret, [StringComparison]::OrdinalIgnoreCase) -ge 0) {
              throw "Workspace handoff JSON leaked a root path or secret."
            }

            $handoffResponse = Invoke-WebRequest -Uri "http://127.0.0.1:5097/workspace/understanding/handoff.md" -TimeoutSec 15
            if ($handoffResponse.StatusCode -ne 200) { throw "Workspace handoff Markdown did not return 200." }
            if ($handoffResponse.Headers["Cache-Control"] -notmatch "no-store") { throw "Workspace handoff Markdown must be no-store." }
            if ($handoffResponse.Headers["Content-Disposition"] -notmatch 'attachment; filename="nodal-os-workspace-handoff-[0-9a-f]{12}\.md"') {
              throw "Workspace handoff attachment filename is invalid."
            }
            if ($handoffResponse.Headers["Content-Type"] -notmatch 'text/markdown') { throw "Workspace handoff content type is invalid." }
            if ($handoffResponse.Content -notmatch '# NODAL OS Bounded Workspace Handoff' -or
                $handoffResponse.Content -notmatch '## Evidence' -or
                $handoffResponse.Content -notmatch '## Expert Advisor findings' -or
                $handoffResponse.Content -notmatch 'Profile: Balanced \(50/100\)' -or
                $handoffResponse.Content -notmatch '## Next safe step') {
              throw "Workspace advisor handoff Markdown is incomplete."
            }
            if ($handoffResponse.Content -match '<script|<form|https?://') { throw "Workspace handoff contains executable or external content." }
            if ($handoffResponse.Content.IndexOf($workspaceRoot, [StringComparison]::OrdinalIgnoreCase) -ge 0 -or
                $handoffResponse.Content.IndexOf($fakeSecret, [StringComparison]::OrdinalIgnoreCase) -ge 0) {
              throw "Workspace handoff Markdown leaked a root path or secret."
            }

            $fixtureRoot = Join-Path ([System.IO.Path]::GetTempPath()) "nodal-os-mvp-fixtures"
            if (Test-Path $fixtureRoot) {
              $leftovers = @(Get-ChildItem $fixtureRoot -Directory -Filter "run-*" -ErrorAction Stop)
              if ($leftovers.Count -ne 0) { throw "Test-owned file fixtures left run directories behind." }
            }
          }
          finally {
            if (-not $process.HasExited) { Stop-Process -Id $process.Id -Force }
            Remove-Item Env:NODAL_OS_WORKSPACE_ROOT -ErrorAction SilentlyContinue
            Remove-Item Env:NODAL_OS_ADVISOR_PROFILE -ErrorAction SilentlyContinue
            Remove-Item Env:NODAL_OS_ADVISOR_INTERVENTION_LEVEL -ErrorAction SilentlyContinue
            if (Test-Path $workspaceRoot) { Remove-Item $workspaceRoot -Recurse -Force }
            Get-Content $stdout -ErrorAction SilentlyContinue
            Get-Content $stderr -ErrorAction SilentlyContinue
          }

      - name: Upload runtime diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selective-runtime-integration-logs
          path: |
            ${{ runner.temp }}/selective-runtime-integration-build.log
            ${{ runner.temp }}/selective-runtime-integration-test.log
            ${{ runner.temp }}/pilot-runtime-inspector.stdout.log
            ${{ runner.temp }}/pilot-runtime-inspector.stderr.log
          if-no-files-found: ignore
          retention-days: 3
