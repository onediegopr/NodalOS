name: Selective Runtime Integration

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/OneBrain.Core/**"
      - "src/OneBrain.AgentOperations.Core/**"
      - "src/OneBrain.Pilot/**"
      - "tests/OneBrain.Runtime.Tests/**"
      - "tests/OneBrain.Recipes.Tests/**"
      - ".github/workflows/selective-runtime-integration.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: selective-runtime-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime-integration:
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 11 preview
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 11.0.x
          dotnet-quality: preview

      - name: Restore focused projects
        shell: pwsh
        run: |
          dotnet restore tests/OneBrain.Runtime.Tests/OneBrain.Runtime.Tests.csproj
          dotnet restore tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj

      - name: Build runtime and Pilot surfaces
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP "selective-runtime-integration-build.log"
          dotnet build tests/OneBrain.Runtime.Tests/OneBrain.Runtime.Tests.csproj --configuration Release --no-restore --verbosity minimal 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet build tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj --configuration Release --no-restore --verbosity minimal 2>&1 | Tee-Object -FilePath $log -Append
          exit $LASTEXITCODE

      - name: Run selective runtime tests
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP "selective-runtime-integration-test.log"
          dotnet test tests/OneBrain.Runtime.Tests/OneBrain.Runtime.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal" 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet test tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj --configuration Release --no-build --filter "FullyQualifiedName~AIModelConfigurationTests|FullyQualifiedName~PilotAIConfigConsoleTests|FullyQualifiedName~SelectiveRuntimeInspectorRouteTests|FullyQualifiedName~TestOwnedFileCreateRouteTests|FullyQualifiedName~BoundedWorkspaceUnderstandingRouteTests" --logger "console;verbosity=normal" 2>&1 | Tee-Object -FilePath $log -Append
          exit $LASTEXITCODE

      - name: Smoke Pilot product loops
        shell: pwsh
        run: |
          $env:ASPNETCORE_ENVIRONMENT = "Development"
          $workspaceRoot = Join-Path $env:RUNNER_TEMP "nodal-workspace-operator-fixture"
          if (Test-Path $workspaceRoot) { Remove-Item $workspaceRoot -Recurse -Force }
          New-Item -ItemType Directory -Path (Join-Path $workspaceRoot "src") -Force | Out-Null
          [System.IO.File]::WriteAllText((Join-Path $workspaceRoot "README.md"), "# Bounded workspace smoke fixture")
          $fakeSecret = "s" + "k-workspace-fixture-secret-value-123456789"
          [System.IO.File]::WriteAllText(
            (Join-Path $workspaceRoot "src/Program.cs"),
            ('var api_key = "{0}";{1}Console.WriteLine("fixture");' -f $fakeSecret, [Environment]::NewLine)
          )
          $env:NODAL_OS_WORKSPACE_ROOT = $workspaceRoot
          $stdout = Join-Path $env:RUNNER_TEMP "pilot-runtime-inspector.stdout.log"
          $stderr = Join-Path $env:RUNNER_TEMP "pilot-runtime-inspector.stderr.log"
          $process = Start-Process dotnet -ArgumentList @(
            "run",
            "--project", "src/OneBrain.Pilot/OneBrain.Pilot.csproj",
            "--configuration", "Release",
            "--no-build",
            "--",
            "--urls", "http://127.0.0.1:5097"
          ) -PassThru -RedirectStandardOutput $stdout -RedirectStandardError $stderr
          try {
            $ready = $false
            for ($attempt = 0; $attempt -lt 30; $attempt++) {
              if ($process.HasExited) { throw "Pilot exited before the inspector became ready." }
              try {
                $snapshot = Invoke-RestMethod -Uri "http://127.0.0.1:5097/api/runtime/inspector" -TimeoutSec 2
                $ready = $true
                break
              }
              catch {
                Start-Sleep -Seconds 1
              }
            }
            if (-not $ready) { throw "Pilot Runtime Inspector did not become ready." }
            if (-not $snapshot.localDevOnly -or -not $snapshot.readOnly -or -not $snapshot.secretsExcluded) {
              throw "Runtime Inspector boundary flags are invalid."
            }
            if ($snapshot.missionStatus -ne "Completed") { throw "Fixture mission did not complete." }
            $response = Invoke-WebRequest -Uri "http://127.0.0.1:5097/runtime/inspector" -TimeoutSec 5
            if ($response.StatusCode -ne 200) { throw "Runtime Inspector HTML did not return 200." }
            if ($response.Headers["Cache-Control"] -notmatch "no-store") { throw "Runtime Inspector must be no-store." }
            if ($response.Content -notmatch 'data-nodal-os="runtime-inspector"') { throw "Runtime Inspector anchor missing." }
            if ($response.Content -match '<script|<form|https?://') { throw "Runtime Inspector opened an executable or external surface." }

            $fileSnapshot = Invoke-RestMethod -Uri "http://127.0.0.1:5097/api/runtime/file-create-fixture" -TimeoutSec 10
            if (-not $fileSnapshot.localDevOnly -or -not $fileSnapshot.readOnlySurface -or -not $fileSnapshot.secretsExcluded) {
              throw "Create-only fixture boundary flags are invalid."
            }
            if ($fileSnapshot.missionStatus -ne "Completed" -or $fileSnapshot.registryState -ne "Completed") {
              throw "Create-only fixture mission did not complete."
            }
            if ($fileSnapshot.approvalStatus -ne "Approve" -or $fileSnapshot.fileCreateState -ne "CreatedAndVerified") {
              throw "Create-only fixture approval or action state is invalid."
            }
            if (-not $fileSnapshot.fileCreateVerified -or -not $fileSnapshot.testOwnedFixtureCleaned) {
              throw "Create-only fixture verification or cleanup failed."
            }
            if ($fileSnapshot.userWorkspaceFilesystemTouched -or $fileSnapshot.networkUsed -or $fileSnapshot.productAuthorityGranted) {
              throw "Create-only fixture crossed a forbidden boundary."
            }
            $fileResponse = Invoke-WebRequest -Uri "http://127.0.0.1:5097/runtime/file-create-fixture" -TimeoutSec 10
            if ($fileResponse.StatusCode -ne 200) { throw "Create-only fixture HTML did not return 200." }
            if ($fileResponse.Headers["Cache-Control"] -notmatch "no-store") { throw "Create-only fixture surface must be no-store." }
            if ($fileResponse.Content -notmatch 'data-nodal-os="test-owned-file-create"') { throw "Create-only fixture anchor missing." }
            if ($fileResponse.Content -match '<script|<form|https?://') { throw "Create-only fixture opened an executable or external surface." }

            $workspaceJsonResponse = Invoke-WebRequest -Uri "http://127.0.0.1:5097/api/workspace/understanding" -TimeoutSec 15
            if ($workspaceJsonResponse.StatusCode -ne 200) { throw "Bounded workspace JSON did not return 200." }
            if ($workspaceJsonResponse.Headers["Cache-Control"] -notmatch "no-store") { throw "Bounded workspace JSON must be no-store." }
            $workspaceSnapshot = $workspaceJsonResponse.Content | ConvertFrom-Json
            if (-not $workspaceSnapshot.accepted -or -not $workspaceSnapshot.localDevOnly -or -not $workspaceSnapshot.readOnly -or -not $workspaceSnapshot.secretsExcluded) {
              throw "Bounded workspace boundary flags are invalid."
            }
            if ($workspaceSnapshot.missionStatus -ne "Completed") { throw "Bounded workspace mission did not complete." }
            if ($workspaceSnapshot.planDecision -ne "GO_BOUNDED_WORKSPACE_CONTEXT_READY_FOR_REVIEWED_PLAN") {
              throw "Bounded workspace reviewed plan was not produced."
            }
            if ($workspaceSnapshot.filesystemMutationAllowed -or $workspaceSnapshot.networkUsed -or $workspaceSnapshot.productAuthorityGranted) {
              throw "Bounded workspace crossed a forbidden boundary."
            }
            if ($workspaceSnapshot.evidenceDigest.Length -ne 64 -or $workspaceSnapshot.planSteps.Count -lt 1) {
              throw "Bounded workspace evidence or plan is incomplete."
            }
            if ($workspaceJsonResponse.Content.IndexOf($workspaceRoot, [StringComparison]::OrdinalIgnoreCase) -ge 0 -or
                $workspaceJsonResponse.Content.IndexOf($fakeSecret, [StringComparison]::OrdinalIgnoreCase) -ge 0) {
              throw "Bounded workspace JSON leaked a root path or secret."
            }
            $workspaceResponse = Invoke-WebRequest -Uri "http://127.0.0.1:5097/workspace/understanding" -TimeoutSec 15
            if ($workspaceResponse.StatusCode -ne 200) { throw "Bounded workspace HTML did not return 200." }
            if ($workspaceResponse.Headers["Cache-Control"] -notmatch "no-store") { throw "Bounded workspace HTML must be no-store." }
            if ($workspaceResponse.Headers["Content-Security-Policy"] -notmatch "default-src 'none'") { throw "Bounded workspace CSP is missing." }
            if ($workspaceResponse.Content -notmatch 'data-nodal-os="bounded-workspace-understanding"') { throw "Bounded workspace anchor missing." }
            if ($workspaceResponse.Content -notmatch 'data-section-id="plan"') { throw "Bounded workspace plan section missing." }
            if ($workspaceResponse.Content -match '<script|<form|onclick=|https?://') { throw "Bounded workspace opened an executable or external surface." }
            if ($workspaceResponse.Content.IndexOf($workspaceRoot, [StringComparison]::OrdinalIgnoreCase) -ge 0 -or
                $workspaceResponse.Content.IndexOf($fakeSecret, [StringComparison]::OrdinalIgnoreCase) -ge 0) {
              throw "Bounded workspace HTML leaked a root path or secret."
            }

            $fixtureRoot = Join-Path ([System.IO.Path]::GetTempPath()) "nodal-os-mvp-fixtures"
            if (Test-Path $fixtureRoot) {
              $leftovers = @(Get-ChildItem $fixtureRoot -Directory -Filter "run-*" -ErrorAction Stop)
              if ($leftovers.Count -ne 0) { throw "Create-only fixture left test-owned run directories behind." }
            }
          }
          finally {
            if (-not $process.HasExited) { Stop-Process -Id $process.Id -Force }
            Remove-Item Env:NODAL_OS_WORKSPACE_ROOT -ErrorAction SilentlyContinue
            if (Test-Path $workspaceRoot) { Remove-Item $workspaceRoot -Recurse -Force }
            Get-Content $stdout -ErrorAction SilentlyContinue
            Get-Content $stderr -ErrorAction SilentlyContinue
          }

      - name: Upload runtime diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selective-runtime-integration-logs
          path: |
            ${{ runner.temp }}/selective-runtime-integration-build.log
            ${{ runner.temp }}/selective-runtime-integration-test.log
            ${{ runner.temp }}/pilot-runtime-inspector.stdout.log
            ${{ runner.temp }}/pilot-runtime-inspector.stderr.log
          if-no-files-found: ignore
          retention-days: 3
