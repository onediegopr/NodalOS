name: Selective Runtime Integration

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/OneBrain.Runtime.Tests/**"
      - "tests/OneBrain.Recipes.Tests/**"
      - "eng/ci/smoke-pilot-product-loops.ps1"
      - "eng/ci/smoke-mission-control-root.ps1"
      - "eng/ci/smoke-workspace-selection.ps1"
      - "eng/ci/smoke-real-workspace-mission-draft.ps1"
      - "eng/ci/smoke-real-workspace-handoff-execution.ps1"
      - "eng/ci/smoke-real-byok-model-connection.ps1"
      - "eng/ci/openai_compatible_fixture_server.py"
      - "global.json"
      - ".github/workflows/selective-runtime-integration.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: selective-runtime-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch-byok-product-quality:
    if: github.event_name == 'pull_request' && github.head_ref == 'feature/productization-real-byok-connection-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request head
        uses: actions/checkout@v4
        with:
          ref: feature/productization-real-byok-connection-v1
          fetch-depth: 0

      - name: Apply final BYOK quality fixes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace(path: Path, old: str, new: str, count: int = 1) -> None:
              text = path.read_text(encoding='utf-8-sig')
              actual = text.count(old)
              if actual != count:
                  raise SystemExit(f'{path}: expected {count} occurrence(s), found {actual}: {old[:120]!r}')
              path.write_text(text.replace(old, new, count), encoding='utf-8')

          endpoint = Path('src/OneBrain.Pilot/NodalOsByokModelConfigurationEndpointMapper.cs')
          replace(endpoint,
              '    .actions { display:flex; flex-wrap:wrap; gap:9px; }\n',
              '    .actions { display:flex; flex-wrap:wrap; gap:9px; }\n    .secondary-actions { margin-top:12px; }\n')
          replace(endpoint,
              '            <div class="actions"><button class="primary" type="submit">Guardar configuración segura</button>@@TEST_FORM@@@@CLEAR_FORM@@</div>\n          </form>',
              '            <div class="actions"><button class="primary" type="submit">Guardar configuración segura</button></div>\n          </form>\n          <div class="actions secondary-actions">@@TEST_FORM@@@@CLEAR_FORM@@</div>')
          replace(endpoint,
              '''    private static string TypeOptions(string? selected)
    {
        var cloud = string.Equals(selected, nameof(NodalOsByokProviderType.OpenAiCompatibleCloud), StringComparison.Ordinal) ? " selected" : string.Empty;
        var local = string.Equals(selected, nameof(NodalOsByokProviderType.OpenAiCompatibleLocal), StringComparison.Ordinal) ? " selected" : string.Empty;
        return $"<option value=\"OpenAiCompatibleCloud\"{cloud}>OpenAI-compatible cloud · HTTPS + key</option><option value=\"OpenAiCompatibleLocal\"{local}>OpenAI-compatible local · loopback</option>";
    }
''',
              '''    private static string TypeOptions(string? selected)
    {
        var localSelected = string.IsNullOrWhiteSpace(selected) ||
            string.Equals(selected, nameof(NodalOsByokProviderType.OpenAiCompatibleLocal), StringComparison.Ordinal);
        var local = localSelected ? " selected" : string.Empty;
        var cloud = string.Equals(selected, nameof(NodalOsByokProviderType.OpenAiCompatibleCloud), StringComparison.Ordinal) ? " selected" : string.Empty;
        return $"<option value=\"OpenAiCompatibleLocal\"{local}>OpenAI-compatible local · loopback</option><option value=\"OpenAiCompatibleCloud\"{cloud}>OpenAI-compatible cloud · HTTPS + key</option>";
    }
''')

          runtime = Path('src/OneBrain.Pilot/NodalOsByokModelConfigurationRuntime.cs')
          replace(runtime,
              'public static class NodalOsByokModelConfigurationRuntime\n{\n',
              'public static class NodalOsByokModelConfigurationRuntime\n{\n    private static readonly HttpClient SharedHttpClient = new();\n\n')
          replace(runtime, '            new HttpClient());', '            SharedHttpClient);')

          core = Path('src/OneBrain.AgentOperations.Core/Models/NodalOsByokModelConfiguration.cs')
          replace(core,
              '''    IReadOnlyList<NodalOsEvidenceBridgeRef> EvidenceRefs,
    IReadOnlyList<NodalOsCoreTimelineProjection> Timeline,
    DateTimeOffset TestedAt);''',
              '''    IReadOnlyList<NodalOsEvidenceBridgeRef> EvidenceRefs,
    IReadOnlyList<NodalOsCoreTimelineProjection> Timeline,
    bool RealProviderCallAttempted,
    bool NetworkUsed,
    DateTimeOffset TestedAt);''')
          replace(core,
              '''    private const int MaximumResponseBytes = 1024 * 1024;
    private readonly HttpClient client;
''',
              '''    private const int MaximumResponseBytes = 1024 * 1024;
    private readonly HttpClient client;
    private int providerCallAttempted;

    public bool ProviderCallAttempted => Volatile.Read(ref providerCallAttempted) != 0;
''')
          replace(core,
              '''            request.Content = new ByteArrayContent(payload);
            request.Content.Headers.ContentType = new MediaTypeHeaderValue("application/json");
            using var response = await client.SendAsync(''',
              '''            request.Content = new ByteArrayContent(payload);
            request.Content.Headers.ContentType = new MediaTypeHeaderValue("application/json");
            Interlocked.Exchange(ref providerCallAttempted, 1);
            using var response = await client.SendAsync(''')
          replace(core,
              '''        var catalog = BuildCatalog(document);
        var router = new PolicyAwareModelRouter(
            catalog,
            secretStore,
            new NodalOsOpenAiCompatibleAttemptExecutor(httpClient));''',
              '''        var catalog = BuildCatalog(document);
        var attemptExecutor = new NodalOsOpenAiCompatibleAttemptExecutor(httpClient);
        var router = new PolicyAwareModelRouter(
            catalog,
            secretStore,
            attemptExecutor);''')
          replace(core,
              '''            attemptSummaries,
            evidence,
            timeline,
            DateTimeOffset.UtcNow);''',
              '''            attemptSummaries,
            evidence,
            timeline,
            RealProviderCallAttempted: attemptExecutor.ProviderCallAttempted,
            NetworkUsed: attemptExecutor.ProviderCallAttempted,
            DateTimeOffset.UtcNow);''')
          replace(core,
              '''        if (primary is not null && fallback is not null &&
            string.Equals(primary.ProviderId, fallback.ProviderId, StringComparison.OrdinalIgnoreCase) &&
            string.Equals(primary.ModelId, fallback.ModelId, StringComparison.OrdinalIgnoreCase) &&
            string.Equals(primary.Endpoint, fallback.Endpoint, StringComparison.OrdinalIgnoreCase))
            blockers.Add("Fallback must differ from the primary provider route.");''',
              '''        if (primary is not null && fallback is not null &&
            string.Equals(primary.ProviderId, fallback.ProviderId, StringComparison.OrdinalIgnoreCase))
            blockers.Add("Fallback route id must differ from the primary route id.");''')
          replace(core,
              '''            test?.TestedAt,
            RealProviderCallAttempted: test is not null,
            NetworkUsed: test is not null,
            SecretsExcluded: true,''',
              '''            test?.TestedAt,
            RealProviderCallAttempted: test?.RealProviderCallAttempted == true,
            NetworkUsed: test?.NetworkUsed == true,
            SecretsExcluded: true,''')

          tests = Path('tests/OneBrain.Runtime.Tests/NodalOsByokModelConfigurationTests.cs')
          replace(tests, '        Assert.IsTrue(configured.Configured);', '        Assert.AreEqual(true, configured.Configured);')
          marker = '    private static NodalOsByokModelConfigurationRequest Request(\n'
          block = '''    [TestMethod]
    public async Task FallbackRouteIdMustBeUniqueWithinCatalog()
    {
        using var fixture = Fixture.Create();
        using var secrets = new EphemeralSecretReferenceStore();
        var service = fixture.Service(secrets, new QueueHandler());
        var request = Request(
            primaryApiKey: "primary-key",
            enableFallback: true,
            fallbackApiKey: "fallback" + "-key") with
        {
            FallbackProviderId = "primary-provider"
        };

        var result = await service.ConfigureAsync(request);

        Assert.IsFalse(result.Accepted);
        Assert.IsTrue(result.Blockers.Any(value => value.Contains("route id", StringComparison.OrdinalIgnoreCase)));
        Assert.IsFalse(File.Exists(fixture.MetadataPath));
    }

    [TestMethod]
    public async Task UnavailableCredentialFailsBeforeNetworkAndDoesNotClaimProviderCall()
    {
        using var fixture = Fixture.Create();
        using var secrets = new EphemeralSecretReferenceStore();
        var handler = new QueueHandler((_, _) =>
            throw new AssertFailedException("Provider must not be called when the credential reference is unavailable."));
        var service = fixture.Service(secrets, handler);
        var configured = await service.ConfigureAsync(Request(primaryApiKey: "private" + "-fixture-key"));
        Assert.IsTrue(configured.Accepted);
        var json = await File.ReadAllTextAsync(fixture.MetadataPath);
        var document = JsonSerializer.Deserialize<NodalOsPersistedByokModelConfiguration>(json, JsonOptions());
        Assert.IsNotNull(document?.Primary.CredentialReference);
        Assert.IsTrue(await secrets.DeleteAsync(document!.Primary.CredentialReference!));

        var tested = await service.TestConnectionAsync();

        Assert.IsFalse(tested.Accepted);
        Assert.IsFalse(tested.RealProviderCallAttempted);
        Assert.IsFalse(tested.NetworkUsed);
        Assert.AreEqual(1, tested.AttemptCount);
        Assert.AreEqual(0, handler.Calls);
    }

'''
          text = tests.read_text(encoding='utf-8-sig')
          if text.count(marker) != 1:
              raise SystemExit('Runtime tests insertion marker was not unique.')
          tests.write_text(text.replace(marker, block + marker, 1), encoding='utf-8')

          route_tests = Path('tests/OneBrain.Recipes.Tests/NodalOsByokModelConfigurationSelectiveRuntimeInspectorRouteTests.cs')
          replace(route_tests,
              '''        StringAssert.Contains(formResponse.Headers.GetValues("Content-Security-Policy").Single(), "form-action 'self'");
        Assert.IsFalse(formHtml.Contains("<script", StringComparison.OrdinalIgnoreCase));''',
              '''        StringAssert.Contains(formResponse.Headers.GetValues("Content-Security-Policy").Single(), "form-action 'self'");
        Assert.IsFalse(formHtml.Contains("<script", StringComparison.OrdinalIgnoreCase));
        StringAssert.Contains(formHtml, "<option value=\"OpenAiCompatibleLocal\" selected>");''')
          replace(route_tests,
              '''        StringAssert.Contains(configuredPage, "data-configured=\"true\"");
        StringAssert.Contains(configuredPage, "Probar conexión real");
        AssertNoSecret(configuredPage, rawKey, providerContent);''',
              '''        StringAssert.Contains(configuredPage, "data-configured=\"true\"");
        StringAssert.Contains(configuredPage, "Probar conexión real");
        var configForm = Regex.Match(
            configuredPage,
            "<form class=\"config\".*?</form>",
            RegexOptions.IgnoreCase | RegexOptions.Singleline,
            TimeSpan.FromSeconds(1));
        Assert.IsTrue(configForm.Success);
        Assert.IsFalse(configForm.Value.Contains("action=\"/models/test\"", StringComparison.OrdinalIgnoreCase));
        Assert.IsFalse(configForm.Value.Contains("action=\"/models/clear\"", StringComparison.OrdinalIgnoreCase));
        Assert.AreEqual(
            3,
            Regex.Matches(configuredPage, "<form\\b", RegexOptions.IgnoreCase, TimeSpan.FromSeconds(1)).Count);
        AssertNoSecret(configuredPage, rawKey, providerContent);''')
          PY

          if [ -f .github/workflows/one-shot-pr33-byok-product-quality.yml ]; then
            git rm .github/workflows/one-shot-pr33-byok-product-quality.yml
          fi
          git diff --check
          git config user.name 'nodal-os-ci'
          git config user.email 'nodal-os-ci@users.noreply.github.com'
          git add \
            src/OneBrain.AgentOperations.Core/Models/NodalOsByokModelConfiguration.cs \
            src/OneBrain.Pilot/NodalOsByokModelConfigurationEndpointMapper.cs \
            src/OneBrain.Pilot/NodalOsByokModelConfigurationRuntime.cs \
            tests/OneBrain.Runtime.Tests/NodalOsByokModelConfigurationTests.cs \
            tests/OneBrain.Recipes.Tests/NodalOsByokModelConfigurationSelectiveRuntimeInspectorRouteTests.cs
          git commit -m 'fix: harden BYOK product route and audit semantics'
          git push origin HEAD:feature/productization-real-byok-connection-v1

  runtime-integration:
    runs-on: windows-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pinned .NET 11 preview
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 11.0.100-preview.6.26359.118

      - name: Restore focused projects
        shell: pwsh
        run: |
          dotnet restore tests/OneBrain.Runtime.Tests/OneBrain.Runtime.Tests.csproj
          dotnet restore tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj

      - name: Build runtime and Pilot surfaces
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP "selective-runtime-integration-build.log"
          dotnet build tests/OneBrain.Runtime.Tests/OneBrain.Runtime.Tests.csproj --configuration Release --no-restore --verbosity minimal 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet build tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj --configuration Release --no-restore --verbosity minimal 2>&1 | Tee-Object -FilePath $log -Append
          exit $LASTEXITCODE

      - name: Run selective runtime tests
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP "selective-runtime-integration-test.log"
          dotnet test tests/OneBrain.Runtime.Tests/OneBrain.Runtime.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal" 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet test tests/OneBrain.Recipes.Tests/OneBrain.Recipes.Tests.csproj --configuration Release --no-build --filter "FullyQualifiedName~AIModelConfigurationTests|FullyQualifiedName~PilotAIConfigConsoleTests|FullyQualifiedName~SelectiveRuntimeInspectorRouteTests|FullyQualifiedName~TestOwnedFileCreateRouteTests|FullyQualifiedName~TestOwnedFileUpdateRouteTests|FullyQualifiedName~BoundedWorkspaceUnderstandingRouteTests|FullyQualifiedName~BoundedWorkspaceHandoffExportRouteTests|FullyQualifiedName~RealWorkspaceMissionDraft|FullyQualifiedName~RealWorkspaceHandoffExecution|FullyQualifiedName~ByokModelConfiguration" --logger "console;verbosity=normal" 2>&1 | Tee-Object -FilePath $log -Append
          exit $LASTEXITCODE

      - name: Smoke Pilot product loops
        shell: pwsh
        run: ./eng/ci/smoke-pilot-product-loops.ps1

      - name: Smoke canonical Mission Control root
        shell: pwsh
        run: ./eng/ci/smoke-mission-control-root.ps1

      - name: Smoke protected local workspace selection
        shell: pwsh
        run: ./eng/ci/smoke-workspace-selection.ps1

      - name: Smoke persisted real workspace mission draft
        shell: pwsh
        run: ./eng/ci/smoke-real-workspace-mission-draft.ps1

      - name: Smoke approved real workspace handoff execution
        shell: pwsh
        run: ./eng/ci/smoke-real-workspace-handoff-execution.ps1

      - name: Smoke secure real BYOK model connection
        shell: pwsh
        run: ./eng/ci/smoke-real-byok-model-connection.ps1

      - name: Upload runtime diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selective-runtime-integration-logs
          path: |
            ${{ runner.temp }}/selective-runtime-integration-build.log
            ${{ runner.temp }}/selective-runtime-integration-test.log
            ${{ runner.temp }}/pilot-runtime-inspector.stdout.log
            ${{ runner.temp }}/pilot-runtime-inspector.stderr.log
            ${{ runner.temp }}/pilot-mission-control.stdout.log
            ${{ runner.temp }}/pilot-mission-control.stderr.log
            ${{ runner.temp }}/pilot-workspace-selection-first.stdout.log
            ${{ runner.temp }}/pilot-workspace-selection-first.stderr.log
            ${{ runner.temp }}/pilot-workspace-selection-restart.stdout.log
            ${{ runner.temp }}/pilot-workspace-selection-restart.stderr.log
            ${{ runner.temp }}/pilot-real-workspace-mission-first.stdout.log
            ${{ runner.temp }}/pilot-real-workspace-mission-first.stderr.log
            ${{ runner.temp }}/pilot-real-workspace-mission-restart.stdout.log
            ${{ runner.temp }}/pilot-real-workspace-mission-restart.stderr.log
            ${{ runner.temp }}/pilot-real-workspace-handoff-first.stdout.log
            ${{ runner.temp }}/pilot-real-workspace-handoff-first.stderr.log
            ${{ runner.temp }}/pilot-real-workspace-handoff-restart.stdout.log
            ${{ runner.temp }}/pilot-real-workspace-handoff-restart.stderr.log
            ${{ runner.temp }}/pilot-real-byok-first.stdout.log
            ${{ runner.temp }}/pilot-real-byok-first.stderr.log
            ${{ runner.temp }}/pilot-real-byok-restart.stdout.log
            ${{ runner.temp }}/pilot-real-byok-restart.stderr.log
            ${{ runner.temp }}/byok-provider-fixture.stdout.log
            ${{ runner.temp }}/byok-provider-fixture.stderr.log
          if-no-files-found: ignore
          retention-days: 3
