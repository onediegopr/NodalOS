name: One-shot apply focused third-party smoke fix

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/one-shot-integrate-third-party-notices-pr.yml"
      - "eng/ci/one-shot-fix-third-party-smoke.py"

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: release/third-party-notice-inventory
          fetch-depth: 0

      - name: Apply focused smoke fix
        run: python eng/ci/one-shot-fix-third-party-smoke.py

      - name: Commit smoke fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add eng/ci/smoke-desktop-package.ps1
          git commit -m "test: require exactly one generated private-beta bundle"
          git push origin HEAD:release/third-party-notice-inventory
