name: One-shot monotonic MSIX runner probe

on:
  push:
    branches:
      - fix/monotonic-msix-updates
    paths:
      - ".github/workflows/one-shot-apply-monotonic-msix-update.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/one-shot-apply-monotonic-msix-update.yml"

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Probe runner
        run: echo "NODAL_OS_MONOTONIC_RUNNER_PROBE=PASS" | tee monotonic-runner-probe.txt
      - name: Upload probe
        uses: actions/upload-artifact@v4
        with:
          name: monotonic-runner-probe
          path: monotonic-runner-probe.txt
          if-no-files-found: error
          retention-days: 1
