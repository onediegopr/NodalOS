name: One-shot PR33 nullable assertion cleanup

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/one-shot-pr33-nullable-assertion.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head
        uses: actions/checkout@v4
        with:
          ref: feature/productization-real-byok-connection-v1
          fetch-depth: 1
          show-progress: false

      - name: Align nullable assertion with analyzer
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/OneBrain.Runtime.Tests/NodalOsByokModelConfigurationTests.cs')
          text = path.read_text(encoding='utf-8-sig')
          old = '        Assert.AreEqual(true, configured.Primary?.CredentialConfigured);'
          new = '        Assert.IsTrue(configured.Primary?.CredentialConfigured);'
          if text.count(old) != 1:
              raise SystemExit(f'Expected one nullable assertion, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git rm .github/workflows/one-shot-pr33-nullable-assertion.yml
          git diff --check
          git config user.name 'nodal-os-ci'
          git config user.email 'nodal-os-ci@users.noreply.github.com'
          git add tests/OneBrain.Runtime.Tests/NodalOsByokModelConfigurationTests.cs
          git commit -m 'test: use nullable-aware BYOK assertion'
          git push origin HEAD:feature/productization-real-byok-connection-v1
