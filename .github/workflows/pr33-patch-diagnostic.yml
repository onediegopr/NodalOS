name: PR33 BYOK patch diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/pr33-patch-diagnostic.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head
        uses: actions/checkout@v4
        with:
          ref: feature/productization-real-byok-connection-v1
          fetch-depth: 1
          show-progress: false

      - name: Run patch helper without committing
        shell: bash
        run: |
          set +e
          python eng/ci/patch-pr33-byok-quality.py > patch.log 2>&1
          status=$?
          echo "$status" > patch-status.txt
          cat patch.log
          git diff --stat > patch-diff-stat.txt
          exit 0

      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: pr33-byok-patch-diagnostic
          path: |
            patch.log
            patch-status.txt
            patch-diff-stat.txt
          retention-days: 1
