name: One-shot external signing and update contract

on:
  push:
    branches:
      - audit/external-signing-update-contract
    paths:
      - ".github/workflows/one-shot-external-signing-update-contract.yml"
      - "eng/ci/one-shot-external-signing-update-contract.ps1"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/one-shot-external-signing-update-contract.yml"
      - "eng/ci/one-shot-external-signing-update-contract.ps1"

permissions:
  contents: read

jobs:
  release-contract:
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pinned .NET 10 LTS
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.302

      - name: Validate external signing and HTTPS appinstaller metadata
        shell: pwsh
        run: |
          $root = Join-Path $env:RUNNER_TEMP "nodal-release-contract"
          New-Item -ItemType Directory -Path $root -Force | Out-Null
          $log = Join-Path $root "release-contract-run.log"
          ./eng/ci/one-shot-external-signing-update-contract.ps1 *>&1 | Tee-Object -FilePath $log
          exit $LASTEXITCODE

      - name: Upload redacted release-contract evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-signing-update-contract-evidence
          path: |
            ${{ runner.temp }}/nodal-release-contract/release-contract-evidence.json
            ${{ runner.temp }}/nodal-release-contract/release-contract-smoke.log
            ${{ runner.temp }}/nodal-release-contract/release-contract-run.log
          if-no-files-found: warn
          retention-days: 7
