name: Reference-Aware Artifact Cleanup

on:
  pull_request:
    branches:
      - main
      - chrome-lab-001-extension-local-ai-bridge
    paths:
      - tools/repository/clean-unreferenced-artifacts.ps1
      - .github/workflows/reference-aware-artifact-cleanup.yml
      - artifacts/**
      - docs/audit/artifact-cleanup-report.md

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: artifact-cleanup-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  cleanup:
    if: startsWith(github.head_ref, 'maintenance/reference-aware-artifact-cleanup')
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout maintenance branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Remove unreferenced historical artifacts
        shell: pwsh
        env:
          ARTIFACT_CLEANUP_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: ./tools/repository/clean-unreferenced-artifacts.ps1 -Apply

      - name: Validate generated diff
        shell: pwsh
        run: |
          git diff --check
          $report = 'docs/audit/artifact-cleanup-report.md'
          if (-not (Test-Path $report)) {
            throw 'artifact cleanup report was not generated'
          }
          $text = [System.IO.File]::ReadAllText($report)
          foreach ($character in $text.ToCharArray()) {
            $code = [int]$character
            if ($code -lt 32 -and $character -ne "`r" -and $character -ne "`n") {
              throw "artifact cleanup report contains control character code $code"
            }
          }

      - name: Commit cleanup result
        shell: pwsh
        run: |
          if (-not (git status --porcelain)) {
            Write-Host 'No unreferenced tracked artifacts found.'
            exit 0
          }
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore(repo): remove unreferenced historical artifacts'
          git push origin "HEAD:${{ github.head_ref }}"
