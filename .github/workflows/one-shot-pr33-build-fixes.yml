name: One-shot PR33 BYOK build fixes

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/one-shot-pr33-build-fixes.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/productization-real-byok-connection-v1
          fetch-depth: 0
      - name: Fix endpoint scheme checks and deterministic test handler
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          source = Path('src/OneBrain.AgentOperations.Core/Models/NodalOsByokModelConfiguration.cs')
          text = source.read_text(encoding='utf-8')
          text, count = re.subn(
              r'if \(endpoint\.Scheme is not \(Uri\.UriSchemeHttp or Uri\.UriSchemeHttps\)\)\s*\n\s*return null;',
              'if (!string.Equals(endpoint.Scheme, Uri.UriSchemeHttp, StringComparison.OrdinalIgnoreCase) &&\n'
              '            !string.Equals(endpoint.Scheme, Uri.UriSchemeHttps, StringComparison.OrdinalIgnoreCase))\n'
              '            return null;',
              text,
              count=1)
          if count != 1:
              raise SystemExit(f'Expected one scheme-check block, replaced {count}')
          source.write_text(text, encoding='utf-8')

          tests = Path('tests/OneBrain.Runtime.Tests/NodalOsByokModelConfigurationTests.cs')
          text = tests.read_text(encoding='utf-8')

          simple = {
              'Assert.IsTrue(configured.Primary?.CredentialConfigured);':
                  'Assert.IsTrue(configured.Primary?.CredentialConfigured == true);',
              'using (var lease = await secrets.OpenAsync(document.Primary.CredentialReference))':
                  'using (var lease = await secrets.OpenAsync(document!.Primary.CredentialReference!))',
              'Assert.IsNull(await secrets.OpenAsync(document.Primary.CredentialReference));':
                  'Assert.IsNull(await secrets.OpenAsync(document!.Primary.CredentialReference!));',
              'return Json(HttpStatusCode.OK, "NODAL_OK", promptTokens: 11, completionTokens: 3);':
                  'return Task.FromResult(Json(HttpStatusCode.OK, "NODAL_OK", promptTokens: 11, completionTokens: 3));',
              '(_, _) => Json(HttpStatusCode.ServiceUnavailable, "ignored"),':
                  '(_, _) => Task.FromResult(Json(HttpStatusCode.ServiceUnavailable, "ignored")),',
              '(_, _) => Json(HttpStatusCode.OK, "FALLBACK_OK", promptTokens: 7, completionTokens: 2));':
                  '(_, _) => Task.FromResult(Json(HttpStatusCode.OK, "FALLBACK_OK", promptTokens: 7, completionTokens: 2)));'
          }
          for old, new in simple.items():
              if text.count(old) != 1:
                  raise SystemExit(f'Expected one occurrence, found {text.count(old)}: {old}')
              text = text.replace(old, new, 1)

          text, count = re.subn(
              r'\n\s*public QueueHandler\(params Func<HttpRequestMessage, CancellationToken, HttpResponseMessage>\[\] responses\)\s*\n\s*\{\s*\n\s*foreach \(var response in responses\)\s*\n\s*this\.responses\.Enqueue\(\(request, token\) => Task\.FromResult\(response\(request, token\)\)\);\s*\n\s*\}\s*\n',
              '\n',
              text,
              count=1)
          if count != 1:
              raise SystemExit(f'Expected one synchronous QueueHandler constructor, removed {count}')
          tests.write_text(text, encoding='utf-8')
          PY
          git diff --check
          git config user.name 'nodal-os-ci'
          git config user.email 'nodal-os-ci@users.noreply.github.com'
          git add src/OneBrain.AgentOperations.Core/Models/NodalOsByokModelConfiguration.cs tests/OneBrain.Runtime.Tests/NodalOsByokModelConfigurationTests.cs
          git diff --cached --quiet && { echo 'No source change produced.'; exit 1; }
          git commit -m 'fix: compile secure BYOK runtime and tests'
          git push origin HEAD:feature/productization-real-byok-connection-v1
