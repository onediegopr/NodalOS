<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ONE Brain Browser Smoke Test</title>
  <style>
    body  { font-family: sans-serif; padding: 40px; max-width: 600px; }
    h1    { font-size: 1.4em; margin-bottom: 8px; }
    .row  { display: flex; gap: 8px; margin-top: 16px; }
    input { padding: 8px 12px; font-size: 14px; flex: 1; border: 1px solid #888; }
    button{ padding: 8px 18px; font-size: 14px; cursor: pointer; white-space: nowrap; }
    #result {
      margin-top: 20px; padding: 14px; background: #f5f5f5;
      border: 1px solid #ccc; min-height: 44px; font-size: 15px;
    }
  </style>
</head>
<body>
  <h1>ONE Brain Browser Smoke Test</h1>
  <p>Página local para HITO-005. Abrir con Edge/Chrome + <code>--force-renderer-accessibility</code>.</p>

  <div class="row">
    <input
      id="q"
      type="text"
      aria-label="ONE Brain Search"
      placeholder="Escribí algo para buscar..."
    />
    <button
      id="go"
      aria-label="Run ONE Brain Search"
      onclick="runSearch()"
    >
      Buscar
    </button>
  </div>

  <div
    id="result"
    role="status"
    aria-label="Search Result"
    aria-live="polite"
  >
    Resultado aparecerá aquí.
  </div>

  <script>
    function runSearch() {
      var q = document.getElementById('q').value.trim();
      var display = q || '(vacío)';
      document.getElementById('result').textContent = 'Resultado: ' + display;
      document.title = 'ONE Brain — ' + display;
    }

    // Allow Enter key in input
    document.getElementById('q').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') runSearch();
    });
  </script>
</body>
</html>
